    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .sidebar-item { position: relative; transition: all 0.2s ease; }
    .sidebar-item::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: #667eea; transform: scaleY(0); transition: transform 0.2s ease; }
    .sidebar-item.active::before, .sidebar-item:hover::before { transform: scaleY(1); }
    .mobile-menu-open { transform: translateX(0); }
    .mobile-menu-closed { transform: translateX(-100%); }
    .table-wrap { border: 1px solid #E5E7EB; border-radius: 0.5rem; overflow: hidden; }
    .table-head { background: #F9FAFB; }
    .tab-btn.active { color: #2563EB; border-color: #2563EB; background: #EFF6FF; }
    .summary-row { background: #F3F4F6; font-weight: 600; }
    .multi-select { position: relative; width: 9rem; }
    .multi-select-btn {
      width: 100%;
      height: 38px;
      border: 1px solid #D1D5DB;
      border-radius: 0.375rem;
      background: #fff;
      font-size: 0.875rem;
      padding: 0 0.75rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: #374151;
    }
    .multi-select-panel {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      width: 100%;
      max-height: 180px;
      overflow-y: auto;
      border: 1px solid #E5E7EB;
      border-radius: 0.5rem;
      background: #fff;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      padding: 0.5rem;
      z-index: 40;
      display: none;
    }
    .multi-select.open .multi-select-panel { display: block; }
    .multi-select-option { display: flex; align-items: center; gap: 0.5rem; font-size: 0.875rem; color: #374151; padding: 0.25rem; }
    .sidebar-collapsed { width: 64px !important; }
    .sidebar-collapsed .sidebar-item span, .sidebar-collapsed h3 { display: none !important; }
    .sidebar-collapsed .sidebar-item i { margin-right: 0 !important; }
  </style>
</head>

  <script>
    let currentTab = 'customer';

    const customerProfiles = [
      { merchantId: 'M10231', customerName: '晨星出海', bd: 'BD-A', am: 'AM-Luna' },
      { merchantId: 'M39812', customerName: '北极光电商', bd: 'BD-B', am: 'AM-Sam' },
      { merchantId: 'M55001', customerName: '云桥互动', bd: 'BD-C', am: 'AM-Ivy' },
      { merchantId: 'M77420', customerName: '海豚品牌', bd: 'BD-A', am: 'AM-Sam' }
    ];

    const reportDates = ['2026-03-15', '2026-03-16'];
    const mediaCycle = ['Facebook', 'Google', 'TikTok', 'Facebook', 'Google', 'TikTok', 'Facebook', 'Google'];

    function buildCustomerAccounts(profile, customerIndex) {
      const accountCount = customerIndex % 2 === 0 ? 8 : 7;
      const rows = [];
      for (let i = 0; i < accountCount; i += 1) {
        const media = mediaCycle[i];
        const originalCurrency = i % 3 === 0 ? 'USD' : 'EUR';
        const rate = originalCurrency === 'USD' ? 1 : 1.08;
        const accountSuffix = String(i + 1).padStart(2, '0');
        reportDates.forEach((date, dateIndex) => {
          const baseAmount = 1450 + customerIndex * 260 + i * 125 + dateIndex * 180;
          const decimalPart = (customerIndex * 7 + i * 3 + dateIndex * 5) / 100;
          const consumeAmount = +(baseAmount + decimalPart).toFixed(2);
          rows.push({
            date,
            merchantId: profile.merchantId,
            customerName: profile.customerName,
            bd: profile.bd,
            am: profile.am,
            media,
            adAccountId: `act_${profile.merchantId.slice(1)}${accountSuffix}`,
            adAccountName: `${profile.customerName}-${media}-${accountSuffix}`,
            originalCurrency,
            consumeAmount,
            rate,
            usdConsume: +(consumeAmount * rate).toFixed(2)
          });
        });
      }
      return rows;
    }

    const accountRows = customerProfiles.flatMap((profile, index) => buildCustomerAccounts(profile, index));

    const customerRows = reportDates.flatMap(date => {
      return customerProfiles.map(profile => {
        const relatedRows = accountRows.filter(row => row.date === date && row.merchantId === profile.merchantId);
        const eurAmount = relatedRows
          .filter(row => row.originalCurrency === 'EUR')
          .reduce((sum, row) => sum + row.consumeAmount, 0);
        const usdAmount = relatedRows
          .filter(row => row.originalCurrency === 'USD')
          .reduce((sum, row) => sum + row.consumeAmount, 0);
        const usdConsume = relatedRows.reduce((sum, row) => sum + row.usdConsume, 0);
        return {
          date,
          merchantId: profile.merchantId,
          customerName: profile.customerName,
          bd: profile.bd,
          am: profile.am,
          eurCurrency: 'EUR',
          eurAmount: +eurAmount.toFixed(2),
          eurRate: 1.08,
          usdCurrency: 'USD',
          usdAmount: +usdAmount.toFixed(2),
          usdRate: 1,
          usdConsume: +usdConsume.toFixed(2)
        };
      });
    });

    function formatMoney(v) {
      return Number(v).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function getSelectedValues(id) {
      return Array.from(document.querySelectorAll('#' + id + ' input[type="checkbox"]:checked')).map(input => input.value);
    }

    function updateMultiSelectLabel(id) {
      const root = document.getElementById(id);
      const allInputs = root.querySelectorAll('input[type="checkbox"]');
      const checked = root.querySelectorAll('input[type="checkbox"]:checked');
      const label = root.querySelector('.multi-select-label');
      if (checked.length === 0) {
        label.textContent = '全部';
      } else if (checked.length === allInputs.length) {
        label.textContent = '全部';
      } else {
        label.textContent = '已选' + checked.length + '项';
      }
    }

    function toggleMultiSelect(id) {
      const target = document.getElementById(id);
      document.querySelectorAll('.multi-select.open').forEach(node => {
        if (node.id !== id) node.classList.remove('open');
      });
      target.classList.toggle('open');
    }

    function setupMultiSelect() {
      document.querySelectorAll('.multi-select').forEach(root => {
        root.querySelectorAll('input[type="checkbox"]').forEach(input => {
          input.addEventListener('change', () => updateMultiSelectLabel(root.id));
        });
        updateMultiSelectLabel(root.id);
      });

      document.addEventListener('click', (event) => {
        if (!event.target.closest('.multi-select')) {
          document.querySelectorAll('.multi-select.open').forEach(node => node.classList.remove('open'));
        }
      });
    }

    function switchTab(tab) {
      currentTab = tab;
      document.getElementById('tabCustomer').classList.toggle('active', tab === 'customer');
      document.getElementById('tabAccount').classList.toggle('active', tab === 'account');
      document.getElementById('accountOnlyFilters').classList.toggle('hidden', tab !== 'account');
      applyFilters();
    }

    function applyFilters() {
      const startDate = document.getElementById('startDate').value;
      const endDate = document.getElementById('endDate').value;
      const merchantId = document.getElementById('merchantId').value.trim().toLowerCase();
      const customerName = document.getElementById('customerName').value.trim().toLowerCase();
      const bdSelected = getSelectedValues('bdFilter');
      const amSelected = getSelectedValues('amFilter');
      const mediaSelected = getSelectedValues('mediaFilter');
      const adAccountId = document.getElementById('adAccountId').value.trim().toLowerCase();
      const adAccountName = document.getElementById('adAccountName').value.trim().toLowerCase();

      let rows = currentTab === 'customer' ? customerRows : accountRows;
      rows = rows.filter(row => {
        const okDate = (!startDate || row.date >= startDate) && (!endDate || row.date <= endDate);
        const okMerchant = !merchantId || row.merchantId.toLowerCase().includes(merchantId);
        const okCustomer = !customerName || row.customerName.toLowerCase().includes(customerName);
        const okBD = bdSelected.length === 0 || bdSelected.includes(row.bd);
        const okAM = amSelected.length === 0 || amSelected.includes(row.am);

        if (currentTab === 'customer') {
          return okDate && okMerchant && okCustomer && okBD && okAM;
        }
        const okMedia = mediaSelected.length === 0 || mediaSelected.includes(row.media);
        const okAccountId = !adAccountId || row.adAccountId.toLowerCase().includes(adAccountId);
        const okAccountName = !adAccountName || row.adAccountName.toLowerCase().includes(adAccountName);
        return okDate && okMerchant && okCustomer && okBD && okAM && okMedia && okAccountId && okAccountName;
      });

      renderTable(rows);
    }

    function renderTable(rows) {
      const header = document.getElementById('tableHeader');
      const body = document.getElementById('tableBody');
      const summary = document.getElementById('tableSummary');
      header.innerHTML = '';
      body.innerHTML = '';
      summary.innerHTML = '';

      if (currentTab === 'customer') {
        const cols = ['日期', '商户ID', '客户名称', 'BD', 'AM', '欧元币种', '欧元消耗金额', '欧元汇率', '美元币种', '美元消耗金额', '美元汇率', '美元消耗'];
        header.innerHTML = cols.map(c => `<th class="px-4 py-3 text-left text-gray-700 font-semibold">${c}</th>`).join('');

        let totalEurAmount = 0;
        let totalUsdConsume = 0;
        rows.forEach(row => {
          totalEurAmount += row.eurAmount;
          totalUsdConsume += row.usdConsume;
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td class="px-4 py-3">${row.date}</td>
            <td class="px-4 py-3">${row.merchantId}</td>
            <td class="px-4 py-3">${row.customerName}</td>
            <td class="px-4 py-3">${row.bd}</td>
            <td class="px-4 py-3">${row.am}</td>
            <td class="px-4 py-3">${row.eurCurrency}</td>
            <td class="px-4 py-3">${formatMoney(row.eurAmount)}</td>
            <td class="px-4 py-3">${row.eurRate}</td>
            <td class="px-4 py-3">${row.usdCurrency}</td>
            <td class="px-4 py-3">${formatMoney(row.usdAmount)}</td>
            <td class="px-4 py-3">${row.usdRate}</td>
            <td class="px-4 py-3">${formatMoney(row.usdConsume)}</td>
          `;
          body.appendChild(tr);
        });
        summary.innerHTML = `
          <td class="px-4 py-3" colspan="6">当前数据汇总</td>
          <td class="px-4 py-3">${formatMoney(totalEurAmount)}</td>
          <td class="px-4 py-3">-</td>
          <td class="px-4 py-3">-</td>
          <td class="px-4 py-3">-</td>
          <td class="px-4 py-3">-</td>
          <td class="px-4 py-3">${formatMoney(totalUsdConsume)}</td>
        `;
        return;
      }

      const cols = ['日期', '商户ID', '客户名称', 'BD', 'AM', '媒体', '广告账户ID', '广告账户名称', '原币种', '消耗金额', '汇率', '美元消耗'];
      header.innerHTML = cols.map(c => `<th class="px-4 py-3 text-left text-gray-700 font-semibold">${c}</th>`).join('');

      let totalConsumeAmount = 0;
      let totalUsdConsume = 0;
      rows.forEach(row => {
        totalConsumeAmount += row.consumeAmount;
        totalUsdConsume += row.usdConsume;
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td class="px-4 py-3">${row.date}</td>
          <td class="px-4 py-3">${row.merchantId}</td>
          <td class="px-4 py-3">${row.customerName}</td>
          <td class="px-4 py-3">${row.bd}</td>
          <td class="px-4 py-3">${row.am}</td>
          <td class="px-4 py-3">${row.media}</td>
          <td class="px-4 py-3">${row.adAccountId}</td>
          <td class="px-4 py-3">${row.adAccountName}</td>
          <td class="px-4 py-3">${row.originalCurrency}</td>
          <td class="px-4 py-3">${formatMoney(row.consumeAmount)}</td>
          <td class="px-4 py-3">${row.rate}</td>
          <td class="px-4 py-3">${formatMoney(row.usdConsume)}</td>
        `;
        body.appendChild(tr);
      });

      summary.innerHTML = `
        <td class="px-4 py-3" colspan="9">当前数据汇总</td>
        <td class="px-4 py-3">${formatMoney(totalConsumeAmount)}</td>
        <td class="px-4 py-3">-</td>
        <td class="px-4 py-3">${formatMoney(totalUsdConsume)}</td>
      `;
    }

    function setupDefaultDate() {
      const allDates = accountRows.map(row => row.date).sort();
      document.getElementById('startDate').value = allDates[0];
      document.getElementById('endDate').value = allDates[allDates.length - 1];
    }

    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebar-overlay');
      if (sidebar.classList.contains('mobile-menu-closed')) {
        sidebar.classList.remove('mobile-menu-closed');
        sidebar.classList.add('mobile-menu-open');
        overlay.classList.remove('hidden', 'opacity-0');
        overlay.classList.add('opacity-50');
      } else {
        sidebar.classList.remove('mobile-menu-open');
        sidebar.classList.add('mobile-menu-closed');
        overlay.classList.add('opacity-0');
        overlay.classList.remove('opacity-50');
        setTimeout(() => overlay.classList.add('hidden'), 300);
      }
    }

    document.getElementById('sidebar-overlay').addEventListener('click', () => toggleSidebar());

    function toggleSidebarCollapse() {
      const sidebar = document.getElementById('sidebar');
      sidebar.classList.toggle('sidebar-collapsed');
      const icon = document.querySelector('#sidebarCollapseBtn i');
      icon.classList.toggle('fa-angle-double-left');
      icon.classList.toggle('fa-angle-double-right');
    }

    function toggleMenuSection(id) {
      const ul = document.getElementById(id);
      const arrow = document.getElementById(id + 'Arrow');
      if (ul.style.display === 'none') {
        ul.style.display = '';
        arrow.classList.remove('fa-chevron-right');
        arrow.classList.add('fa-chevron-down');
      } else {
        ul.style.display = 'none';
        arrow.classList.remove('fa-chevron-down');
        arrow.classList.add('fa-chevron-right');
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      setupMultiSelect();
      setupDefaultDate();
      applyFilters();
    });
  </script>
</body>
</html>
